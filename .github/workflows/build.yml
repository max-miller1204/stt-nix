name: Build and cache (CPU)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cpu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            extra-substituters = https://stt-nix.cachix.org
            extra-trusted-public-keys = stt-nix.cachix.org-1:qIY27UyHLYEhrAoNXpmilgQFJ7oXv0IIpScCUx25eWI=

      - uses: cachix/cachix-action@v15
        with:
          name: stt-nix
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build CPU variant
        run: nix build .#cpu
